---
apiVersion: k8up.io/v1
kind: PreBackupPod
metadata:
  name: linkding-db-dump
  labels:
    name: linkding
spec:
  backupCommand: sh -c 'sqlite3 /data/db.sqlite3 .dump'
  pod:
    spec:
      securityContext:
        runAsUser: 0
      containers:
        - name: linkding-sqlite-dump
          image: alpine/sqlite:3.51.2
          command:
            - 'sleep'
            - 'infinity'
          volumeMounts:
            - name: linkding-data
              mountPath: "/data"
      volumes:
        - name: linkding-data
          persistentVolumeClaim:
            claimName: linkding-data

