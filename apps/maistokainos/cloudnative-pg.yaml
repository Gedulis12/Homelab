---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: maistokainos-database
spec:
  inheritedMetadata:
    annotations:
      k8s.grafana.com/scrape: "true"
      k8s.grafana.com/metrics.portName: metrics
  instances: 1
  postgresql:
    parameters:
      shared_buffers: "512MB"
      work_mem: "64MB"
  resources:
    requests:
      memory: "768Mi"
      cpu: "250m"
  storage:
    pvcTemplate:
      storageClassName: ""
      accessModes:
        - ReadWriteMany
      resources:
        requests:
          storage: 1Mi
  imageName: ghcr.io/cloudnative-pg/postgresql:17.9

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: maistokainos-database
spec:
  storageClassName: ""
  capacity:
    storage: 1Mi
  volumeMode: Filesystem
  claimRef:
    name: maistokainos-database-1
    namespace: maistokainos
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Delete
  nfs:
    path: /mnt/fast/cnpg/maistokainos
    server: 192.168.0.222
  mountOptions:
    - noatime
    - vers=3
    - soft
    - timeo=600
    - retrans=5
    - rsize=8192
    - wsize=8192
    - lookupcache=none
    - tcp
