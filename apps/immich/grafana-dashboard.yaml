---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaFolder
metadata:
  name: immich-folder
spec:
  title: Immich
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: immich-library
spec:
  folderRef: immich-folder
  allowCrossNamespaceImport: true
  resyncPeriod: 5m
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  # Portability: map the ${DS_IMMICH} input to whatever the Immich Postgres
  # datasource is named on this instance. Ships as "Immich" (see
  # grafana-datasource.yaml); change datasourceName to deploy elsewhere.
  datasources:
    - inputName: "DS_IMMICH"
      datasourceName: "Immich"
  # Dashboard JSON is kept in dashboards/immich-library.json and delivered via a
  # ConfigMap (generated by kustomize with a stable name).
  configMapRef:
    name: immich-library-dashboard
    key: immich-library.json
