---
apiVersion: k8up.io/v1
kind: PodConfig
metadata:
  name: immich-podconfig
spec:
  template:
    spec:
      initContainers:
        - name: database-backup
          image: alpine:latest
          command: ['sh', '-c']
          args:
            - |
              set -ex

              apk add --no-cache curl > /dev/null

              API_URL="http://immich-server.immich.svc.cluster.local:2283/api"

              echo "Fetching current backup fingerprint..."
              BEFORE_HASH=$(curl -s -X GET "$API_URL/admin/database-backups" -H "x-api-key: $API_KEY" | grep -o '"filename":"[^"]*"' | sort | sha256sum)
              echo "Current backup hash: $BEFORE_HASH"

              echo "Triggering new database backup..."
              curl -s -X POST "$API_URL/jobs" \
                -H "x-api-key: $API_KEY" \
                -H "Content-Type: application/json" \
                -d '{"name":"backup-database"}' > /dev/null

              echo "Waiting for the backup to complete..."

              MAX_RETRIES=30
              RETRY_INTERVAL=10
              ATTEMPT=0

              while [ $ATTEMPT -lt $MAX_RETRIES ]; do
                AFTER_HASH=$(curl -s -X GET "$API_URL/admin/database-backups" -H "x-api-key: $API_KEY" | grep -o '"filename":"[^"]*"' | sort | sha256sum)

                if [ "$AFTER_HASH" != "$BEFORE_HASH" ]; then
                  echo "Success: New backup detected!"
                  exit 0
                fi

                ATTEMPT=$((ATTEMPT + 1))
                echo "Still waiting... (Attempt $ATTEMPT/$MAX_RETRIES). Retrying in $RETRY_INTERVAL seconds."
                sleep $RETRY_INTERVAL
              done

              echo "Error: Timeout reached. Backup didn't complete within $((MAX_RETRIES * RETRY_INTERVAL)) seconds."
              exit 1
          envFrom:
            - secretRef:
                name: immich-admin-api-key
      containers:
        - name: k8up-immich-backup-pod
