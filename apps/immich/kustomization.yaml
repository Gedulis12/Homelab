---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: immich

helmCharts:
  - name: immich
    repo: https://immich-app.github.io/immich-charts
    namespace: immich
    version: 0.12.0
    releaseName: immich
    valuesFile: values.yaml

resources:
  - cloudnative-pg.yaml
  - pvc.yaml
  - httproute.yaml
  - sealed-secret.yaml
  - grafana-datasource.yaml
  - grafana-dashboard.yaml
  - backup-pod-config.yaml
  - backup-schedule.yaml

configMapGenerator:
  # Delivers the dashboard JSON to the GrafanaDashboard via configMapRef.
  # disableNameSuffixHash keeps the name stable so the CRD reference holds.
  - name: immich-library-dashboard
    files:
      - immich-library.json=dashboards/immich-library.json
    options:
      disableNameSuffixHash: true
