---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: actualbudget-data
  annotations:
    k8up.io/backup: true
spec:
  storageClassName: ""
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Mi

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: actualbudget-data
spec:
  storageClassName: ""
  capacity:
    storage: 1Mi
  volumeMode: Filesystem
  claimRef:
    name: actualbudget-data
    namespace: actualbudget
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Delete
  nfs:
    path: /mnt/fast/actualbudget
    server: 192.168.0.222
  mountOptions:
    - noatime
    - hard
    - timeo=600
    - retrans=2
