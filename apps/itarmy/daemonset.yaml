---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: itarmy
  labels:
    app: itarmy
spec:
  selector:
    matchLabels:
      app: itarmy
  template:
    metadata:
      labels:
        app: itarmy
    spec:
      nodeSelector:
        kubernetes.io/os: linux
      tolerations:
        - operator: Exists
      volumes:
        - name: itarmy-data
          hostPath:
            path: /opt/itarmykit/
            type: DirectoryOrCreate
      containers:
        - name: itarmykit
          image: registry.download.itarmy.com.ua/itarmykit-headless:2.3.1
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              if [ -n "$PARTICIPANT_ID" ] && [ -n "$API_KEY" ]; then
                /opt/itarmykit-headless/kit-headless-supervisor identity set-participant-id "$PARTICIPANT_ID"
                /opt/itarmykit-headless/kit-headless-supervisor identity set-api-key "$API_KEY"
                /opt/itarmykit-headless/kit-headless-supervisor identity opt-in 1
              fi
              /opt/itarmykit-headless/kit-headless-supervisor settings set proxy 0
              /opt/itarmykit-headless/kit-headless-supervisor settings set cpuLimitPercent 30
              /opt/itarmykit-headless/kit-headless-supervisor settings set bandwidthLimitMbps 100
              /opt/itarmykit-headless/kit-headless-supervisor settings set enableSyn 1
              exec /opt/itarmykit-headless/kit-headless-supervisor run
          volumeMounts:
            - name: itarmy-data
              mountPath: /var/lib/itarmykit-headless/
          securityContext:
            privileged: true
            runAsUser: 0
          env:
            - name: PARTICIPANT_ID
              valueFrom:
                secretKeyRef:
                  name: itarmy-identity
                  key: participant-id
                  optional: true
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: itarmy-identity
                  key: api-key
                  optional: true
