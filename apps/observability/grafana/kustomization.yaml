---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: observability

helmCharts:
  - name: grafana
    repo: https://grafana-community.github.io/helm-charts
    namespace: observability
    version: 12.1.1
    releaseName: grafana
    valuesFile: values.yaml

resources:
  - pvc.yaml
  - httproute.yaml
  - sealed-secret.yaml
  - backup-schedule.yaml
  - pre-backup-pod.yaml
