---
loki:
  ui:
    enabled: true
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: 2024-04-01
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  pattern_ingester:
    enabled: true
  limits_config:
    allow_structured_metadata: true
    volume_enabled: true
  ruler:
    enable_api: true
  storage:
    type: filesystem
  auth_enabled: false

lokiCanary:
  enabled: false

test:
  enabled: false

chunksCache:
  allocatedMemory: 100

resultsCache:
  allocatedMemory: 100

gateway:
  enabled: true
  route:
    main:
      enabled: true
      hostnames:
        - loki.g2net.xyz
      parentRefs:
        - name: cilium-shared-gateway
          namespace: kube-system
          sectionName: https

deploymentMode: SingleBinary
singleBinary:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                  - pi
  replicas: 1
  persistence:
    enabled: false
  dataVolumeParameters:
    persistentVolumeClaim:
      claimName: loki-pvc

backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

ingester:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
queryScheduler:
  replicas: 0
distributor:
  replicas: 0
compactor:
  replicas: 0
indexGateway:
  replicas: 0
bloomCompactor:
  replicas: 0
bloomGateway:
  replicas: 0
