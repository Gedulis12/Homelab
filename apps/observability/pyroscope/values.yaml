---
pyroscope:
  persistence:
    enabled: true
    existingClaim: pyroscope-pvc
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                  - pi
  # Explicitly use filesystem backend (default in v2, but explicit is safer)
  structuredConfig:
    storage:
      backend: filesystem

architecture:
  storage:
    v1: false
    v2: true

serviceMonitor:
  enabled: true
  labels:
    release: kube-prometheus-stack

alloy:
  enabled: false
