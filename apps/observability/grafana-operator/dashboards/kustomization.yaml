apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - argocd.yaml
  - beyla-red-metrics.yaml
  - cert-manager.yaml
  - power-usage.yaml
  - node-exporter.yaml
  - k8s-dashboard.yaml
  - strava.yaml
  - cilium.yaml
  - kubernetes.yaml
  - qbittorrent.yaml
  - go.yaml
  - grafana.yaml
  - k8up.yaml
  - kube-state-metrics.yaml
  - tailscale.yaml
  - alloy-mixins.yaml
  - kubernetes-mixins.yaml
  - prometheus.yaml
  - prometheus-remote-write.yaml

configMapGenerator:
  - name: alloy-mixins
    files:
      - mixins/alloy/alloy-cluster-node.json
      - mixins/alloy/alloy-cluster-overview.json
      - mixins/alloy/alloy-controller.json
      - mixins/alloy/alloy-logs.json
      - mixins/alloy/alloy-loki.json
      - mixins/alloy/alloy-opentelemetry.json
      - mixins/alloy/alloy-otel-engine-overview.json
      - mixins/alloy/alloy-prometheus-remote-write.json
      - mixins/alloy/alloy-resources.json
    options:
      disableNameSuffixHash: true
  - name: kubernetes-mixins
    files:
      - mixins/kubernetes/apiserver.json
      - mixins/kubernetes/cluster-total.json
      - mixins/kubernetes/controller-manager.json
      - mixins/kubernetes/k8s-resources-cluster.json
      - mixins/kubernetes/k8s-resources-namespace.json
      - mixins/kubernetes/k8s-resources-node.json
      - mixins/kubernetes/k8s-resources-pod.json
      - mixins/kubernetes/k8s-resources-windows-cluster.json
      - mixins/kubernetes/k8s-resources-windows-namespace.json
      - mixins/kubernetes/k8s-resources-windows-pod.json
      - mixins/kubernetes/k8s-resources-workload.json
      - mixins/kubernetes/k8s-resources-workloads-namespace.json
      - mixins/kubernetes/k8s-windows-cluster-rsrc-use.json
      - mixins/kubernetes/k8s-windows-node-rsrc-use.json
      - mixins/kubernetes/kubelet.json
      - mixins/kubernetes/namespace-by-pod.json
      - mixins/kubernetes/namespace-by-workload.json
      - mixins/kubernetes/persistentvolumesusage.json
      - mixins/kubernetes/pod-total.json
      - mixins/kubernetes/proxy.json
      - mixins/kubernetes/scheduler.json
      - mixins/kubernetes/workload-total.json
    options:
      disableNameSuffixHash: true
