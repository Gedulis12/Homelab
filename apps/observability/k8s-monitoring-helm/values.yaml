cluster:
  name: k3s-homelab

# v4: Destinations changed from a list to a map (keyed by name)
destinations:
  loki:
    type: loki
    url: http://loki-gateway/loki/api/v1/push
  prometheus:
    type: prometheus
    url: http://prometheus-operated:9090/api/v1/write
  tempo:
    type: otlp
    url: http://tempo:4317
    tls:
      insecure: true
    metrics:
      enabled: false
    logs:
      enabled: false
    traces:
      enabled: true
  pyroscope:
    type: pyroscope
    url: http://pyroscope:4040

# v4: User-defined collectors with presets (replaces fixed alloy-* names)
collectors:
  metrics-collector:
    presets: [clustered, statefulset]
  logs-collector:
    presets: [filesystem-log-reader, daemonset]
  events-collector:
    presets: [singleton]
  receiver-collector:
    presets: [daemonset]
  profiles-collector:
    presets: [privileged, daemonset]

clusterMetrics:
  enabled: true
  collector: metrics-collector
  global:
    scrapeInterval: 30s
  kubelet:
    metricsTuning:
      useDefaultAllowList: false
  cadvisor:
    metricsTuning:
      useDefaultAllowList: false
  apiServer:
    enabled: true

# v4: Host metrics split from clusterMetrics (Linux hosts via Node Exporter)
hostMetrics:
  enabled: true
  linuxHosts:
    enabled: true
    metricsTuning:
      useDefaultAllowList: false

clusterEvents:
  enabled: true
  collector: events-collector

nodeLogs:
  enabled: true
  collector: logs-collector

# v4: podLogs split into podLogsViaLoki / podLogsViaOpenTelemetry
podLogsViaLoki:
  enabled: true
  collector: logs-collector

annotationAutodiscovery:
  enabled: true
  scrapeInterval: 30s
  collector: metrics-collector

autoInstrumentation:
  enabled: true
  beyla:
    metricsTuning:
      excludeMetrics:
        - http_client_request_body_size.*
        - http_client_response_body_size.*
        - http_server_request_body_size.*
        - http_server_response_body_size.*
    config:
      data:
        ebpf:
          enable_context_propagation: true
          traffic_control_backend: tcx
          disable_blackbox_cp: true
          track_request_headers: true
        discovery:
          services:
            - k8s_namespace: .
          exclude_services:
            - k8s_namespace: observability
            - exe_path: .*alloy.*|.*otelcol.*|.*beyla.*
        routes:
          patterns:
            - /apis/{api}/{version}/{name}/*
            - /api/{version}/{name}/*
          ignored_patterns:
            - /metrics
            - /health
            - /healthz
            - /ready
            - /readyz

applicationObservability:
  enabled: true
  collector: receiver-collector
  receivers:
    otlp:
      grpc:
        enabled: true
        includeMetadata: true
      http:
        enabled: true
        includeMetadata: true
  connectors:
    spanLogs:
      enabled: false
    spanMetrics:
      enabled: false

prometheusOperatorObjects:
  enabled: true

# v4: Profiling requires explicitly enabling individual profilers
profiling:
  enabled: true
  collector: profiles-collector
  ebpf:
    enabled: true
  pprof:
    enabled: true
  java:
    enabled: false

# v4: Telemetry services are now explicitly deployed (separate from features)
telemetryServices:
  kube-state-metrics:
    deploy: true
  node-exporter:
    deploy: true

alloy-operator:
  deploy: true
  waitForAlloyRemoval:
    enabled: false

integrations:
  collector: metrics-collector
  cert-manager:
    instances:
      - name: cert-manager
        namespace: kube-system
        labelSelectors:
          app.kubernetes.io/name: cert-manager
  alloy:
    instances:
      - name: alloy
        labelSelectors:
          app.kubernetes.io/name:
            - alloy-logs
            - alloy-metrics
            - alloy-receiver
            - alloy-singleton
            - alloy-profiles
        metrics:
          tuning:
            useDefaultAllowList: false
  grafana:
    instances:
      - name: grafana
        namespace: observability
        labelSelectors:
          app.kubernetes.io/name: grafana
        metrics:
          tuning:
            useDefaultAllowList: false
  loki:
    instances:
      - name: loki
        namespace: observability
        labelSelectors:
          app.kubernetes.io/name: loki
        metrics:
          tuning:
            useDefaultAllowList: false
  tempo:
    instances:
      - name: tempo
        namespace: observability
        labelSelectors:
          app.kubernetes.io/name: tempo
        metrics:
          tuning:
            useDefaultAllowList: false
