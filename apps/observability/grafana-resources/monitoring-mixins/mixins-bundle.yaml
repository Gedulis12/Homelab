\n            {\n              \"datasource\": \"${datasource}\",\n              \"expr\": \"sum by(${groupby}) (rate(otelcol_processor_refused_spans_total{cluster=~\\\"$cluster\\\", namespace=~\\\"$namespace\\\", job=~\\\"$job\\\"}[$__rate_interval]))\\n\",\n              \"instant\": false,\n              \"legendFormat\": \"{{${groupby}}} spans\",\n              \"range\": true\n            },\n            {\n              \"datasource\": \"${datasource}\",\n              \"expr\": \"sum by(${groupby}) (rate(otelcol_processor_refused_metric_points_total{cluster=~\\\"$cluster\\\", namespace=~\\\"$namespace\\\", job=~\\\"$job\\\"}[$__rate_interval]))\\n\",\n              \"instant\": false,\n              \"legendFormat\": \"{{${groupby}}} metric points\",\n              \"range\": true\n            }\n          ],\n          \"title\": \"Processor refused by ${groupby}\",\n          \"type\": \"timeseries\"\n        },\n        {\n          \"datasource\": \"${datasource}\",\n          \"description\": \"Distribution of batch sizes when sent. Works with both batching approaches:\\nthe batch processor (processor/batch) and the exporter sending_queue batch (sending_queue.batch).\\nWhichever is active will populate this panel.\\nRequires \\\"normal\\\" telemetry level.\",\n          \"gridPos\": {\n            \"h\": 10,\n            \"w\": 8,\n            \"x\": 0,\n            \"y\": 120\n          },\n          \"maxDataPoints\": 30,\n          \"options\": {\n            \"calculate\": false,\n            \"color\": {\n              \"exponent\": 0.5,\n              \"fill\": \"dark-orange\",\n              \"mode\": \"scheme\",\n              \"scale\": \"exponential\",\n              \"scheme\": \"Oranges\",\n              \"steps\": 65\n            },\n            \"exemplars\": {\n              \"color\": \"rgba(255,0,255,0.7)\"\n            },\n            \"filterValues\": {\n              \"le\": 0.000000001\n            },\n            \"tooltip\": {\n              \"show\": true,\n              \"yHistogram\": true\n            },\n            \"yAxis\": {\n              \"unit\": \"short\"\n            }\n          },\n          \"pluginVersion\": \"9.0.6\",\n          \"targets\": [\n            {\n              \"datasource\": \"${datasource}\",\n              \"expr\": \"sum by (le) (increase(otelcol_exporter_queue_batch_send_size_bucket{cluster=~\\\"$cluster\\\", namespace=~\\\"$namespace\\\", job=~\\\"$job\\\"}[$__rate_interval]))\\nor\\nsum by (le) (increase(otelcol_processor_batch_batch_send_size_bucket{cluster=~\\\"$cluster\\\", namespace=~\\\"$namespace\\\", job=~\\\"$job\\\"}[$__rate_interval]))\\n\",\n              \"format\": \"heatmap\",\n              \"instant\": false,\n              \"legendFormat\": \"{{le}}\",\n              \"range\": true\n            }\n          ],\n          \"title\": \"Batch send size\",\n          \"type\": \"heatmap\"\n        },\n        {\n          \"datasource\": \"${datasource}\",\n          \"description\": \"How batches are flushed: by reaching the size limit or by timeout. Mostly timeout triggers may indicate low throughput or a large batch size setting. Only available with the batch processor; the exporter sending_queue batch does not emit trigger metrics. Requires \\\"normal\\\" telemetry level.\",\n          \"fieldConfig\": {\n            \"defaults\": {\n              \"unit\": \"cps\"\n            }\n          },\n          \"gridPos\": {\n            \"h\": 10,\n            \"w\": 8,\n            \"x\": 8,\n            \"y\": 120\n          },\n          \"targets\": [\n            {\n              \"datasource\": \"${datasource}\",\n              \"expr\": \"sum by(${groupby}) (rate(otelcol_processor_batch_batch_size_trigger_send_total{cluster=~\\\"$cluster\\\", namespace=~\\\"$namespace\\\", job=~\\\"$job\\\"}[$__rate_interval]))\\n\",\n              \"instant\": false,\n              \"legendFormat\": \"{{${groupby}}} size trigger\",\n              \"range\": true\n            },\n            {\n              \"datasource\": \"${datasource}\",\n              \"expr\": \"sum by(${groupby}) (rate(otelcol_processor_batch_timeout_trigger_send_total{cluster=~\\\"$cluster\\\", namespace=~\\\"$namespace\\\", job=~\\\"$job\\\"}[$__rate_interval]))\\n\",\n              \"instant\": false,\n              \"legendFormat\": \"{{${groupby}}} timeout trigger\",\n              \"range\": true\n            }\n          ],\n          \"title\": \"Batch send triggers by ${groupby}\",\n          \"type\": \"timeseries\"\n        },\n        {\n          \"datasource\": \"${datasource}\",\n          \"description\": \"Number of distinct metadata value combinations being processed. High cardinality increases memory usage and may hit the metadata_cardinality_limit. Only available with the batch processor; the exporter sending_queue batch does not emit this metric. Requires \\\"normal\\\" telemetry level.\",\n          \"gridPos\": {\n            \"h\": 10,\n            \"w\": 8,\n            \"x\": 16,\n            \"y\": 120\n          },\n          \"targets\": [\n            {\n              \"datasource\": \"${datasource}\",\n              \"expr\": \"sum by(${groupby}) (otelcol_processor_batch_metadata_cardinality{cluster=~\\\"$cluster\\\", namespace=~\\\"$namespace\\\", job=~\\\"$job\\\"})\\n\",\n              \"instant\": false,\n              \"legendFormat\": \"{{${groupby}}}\",\n              \"range\": true\n            }\n          ],\n          \"title\": \"Batch metadata cardinality by ${groupby}\",\n          \"type\": \"timeseries\"\n        }\n      ],\n      \"title\": \"Processing & Batching\",\n      \"type\": \"row\"\n    },\n    {\n      \"collapsed\": true,\n      \"datasource\": \"${datasource}\",\n      \"gridPos\": {\n        \"h\": 1,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 130\n      },\n      \"panels\": [\n        {\n          \"datasource\": \"${datasource}\",\n          \"description\": \"CPU cores used by OTel engine processes. 1.0 = 100% of one core.\",\n          \"fieldConfig\": {\n            \"defaults\": {\n              \"unit\": \"short\"\n            },\n            \"overrides\": [\n              {\n                \"matcher\": {\n                  \"id\": \"byName\",\n                  \"options\": \"average\"\n                },\n                \"properties\": [\n                  {\n                    \"id\": \"color\",\n                    \"value\": {\n                      \"fixedColor\": \"green\",\n                      \"mode\": \"fixed\"\n                    }\n                  },\n                  {\n                    \"id\": \"custom.lineStyle\",\n                    \"value\": {\n                      \"dash\": [\n                        10,\n                        10\n                      ],\n                      \"fill\": \"dash\"\n                    }\n                  },\n                  {\n                    \"id\": \"custom.lineWidth\",\n                    \"value\": 2\n                  }\n                ]\n              }\n            ]\n          },\n          \"gridPos\": {\n            \"h\": 10,\n            \"w\": 8,\n            \"x\": 0,\n            \"y\": 130\n          },\n          \"targets\": [\n            {\n              \"datasource\": \"${datasource}\",\n              \"expr\": \"avg(sum by(instance) (rate(otelcol_process_cpu_seconds_total{cluster=~\\\"$cluster\\\", namespace=~\\\"$namespace\\\", job=~\\\"$job\\\"}[$__rate_interval])))\\n\",\n              \"instant\": false,\n              \"legendFormat\": \"average\",\n              \"range\": true\n            },\n            {\n              \"datasource\": \"${datasource}\",\n              \"expr\": \"sum by(instance) (rate(otelcol_process_cpu_seconds_total{cluster=~\\\"$cluster\\\", namespace=~\\\"$namespace\\\", job=~\\\"$job\\\"}[$__rate_interval]))\\n\",\n              \"instant\": false,\n              \"legendFormat\": \"_