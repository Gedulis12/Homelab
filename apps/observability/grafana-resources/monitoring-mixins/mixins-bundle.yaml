  "apiserver.json": "{\n  \"editable\": false,\n  \"links\": [\n    {\n      \"asDropdown\": true,\n      \"includeVars\": true,\n      \"keepTime\": true,\n      \"tags\": [\n        \"kubernetes\",\n        \"infrastructure\"\n      ],\n      \"targetBlank\": false,\n      \"title\": \"Kubernetes\",\n      \"type\": \"dashboards\"\n    }\n  ],\n  \"panels\": [\n    {\n      \"datasource\": {\n        \"type\": \"datasource\",\n        \"uid\": \"-- Mixed --\"\n      },\n      \"description\": \"The SLO (service level objective) and other metrics displayed on this dashboard are for informational purposes only.\",\n      \"gridPos\": {\n        \"h\": 2,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 0\n      },\n      \"id\": 1,\n      \"options\": {\n        \"content\": \"The SLO (service level objective) and other metrics displayed on this dashboard are for informational purposes only.\"\n      },\n      \"pluginVersion\": \"v11.4.0\",\n      \"title\": \"Notice\",\n      \"type\": \"text\"\n    },\n    {\n      \"datasource\": {\n        \"type\": \"datasource\",\n        \"uid\": \"-- Mixed --\"\n      },\n      \"description\": \"How many percent of requests (both read and write) in 30 days have been answered successfully and fast enough?\",\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"decimals\": 3,\n          \"unit\": \"percentunit\"\n        }\n      },\n      \"gridPos\": {\n        \"h\": 7,\n        \"w\": 8,\n        \"x\": 0,\n        \"y\": 2\n      },\n      \"id\": 2,\n      \"interval\": \"1m\",\n      \"pluginVersion\": \"v11.4.0\",\n      \"targets\": [\n        {\n          \"datasource\": {\n            \"type\": \"prometheus\",\n            \"uid\": \"${datasource}\"\n          },\n          \"expr\": \"apiserver_request:availability30d{verb=\\\"all\\\", cluster=\\\"$cluster\\\"}\"\n        }\n      ],\n      \"title\": \"Availability (30d) > 99.000%\",\n      \"type\": \"stat\"\n    },\n    {\n      \"datasource\": {\n        \"type\": \"datasource\",\n        \"uid\": \"-- Mixed --\"\n      },\n      \"description\": \"How much error budget is left looking at our 0.990% availability guarantees?\",\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"custom\": {\n            \"fillOpacity\": 100\n          },\n          \"decimals\": 3,\n          \"unit\": \"percentunit\"\n        }\n      },\n      \"gridPos\": {\n        \"h\": 7,\n        \"w\": 16,\n        \"x\": 8,\n        \"y\": 2\n      },\n      \"id\": 3,\n      \"interval\": \"1m\",\n      \"options\": {\n        \"legend\": {\n          \"asTable\": true,\n          \"placement\": \"right\",\n          \"showLegend\": true\n        },\n        \"tooltip\": {\n          \"mode\": \"single\"\n        }\n      },\n      \"pluginVersion\": \"v11.4.0\",\n      \"targets\": [\n        {\n          \"datasource\": {\n            \"type\": \"prometheus\",\n            \"uid\": \"${datasource}\"\n          },\n          \"expr\": \"100 * (apiserver_request:availability30d{verb=\\\"all\\\", cluster=\\\"$cluster\\\"} - 0.990000)\",\n          \"legendFormat\": \"errorbudget\"\n        }\n      ],\n      \"title\": \"ErrorBudget (30d) > 99.000%\",\n      \"type\": \"timeseries\"\n    },\n    {\n      \"datasource\": {\n        \"type\": \"datasource\",\n        \"uid\": \"-- Mixed --\"\n      },\n      \"description\": \"How many percent of read requests (LIST,GET) in 30 days have been answered successfully and fast enough?\",\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"decimals\": 3,\n          \"unit\": \"percentunit\"\n        }\n      },\n      \"gridPos\": {\n        \"h\": 7,\n        \"w\": 6,\n        \"x\": 0,\n        \"y\": 9\n      },\n      \"id\": 4,\n      \"interval\": \"1m\",\n      \"pluginVersion\": \"v11.4.0\",\n      \"targets\": [\n        {\n          \"datasource\": {\n            \"type\": \"prometheus\",\n            \"uid\": \"${datasource}\"\n          },\n          \"expr\": \"apiserver_request:availability30d{verb=\\\"read\\\", cluster=\\\"$cluster\\\"}\"\n        }\n      ],\n      \"title\": \"Read Availability (30d)\",\n      \"type\": \"stat\"\n    },\n    {\n      \"datasource\": {\n        \"type\": \"datasource\",\n        \"uid\": \"-- Mixed --\"\n      },\n      \"description\": \"How many read requests (LIST,GET) per second do the apiservers get by code?\",\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"custom\": {\n            \"fillOpacity\": 100,\n            \"stacking\": {\n              \"mode\": \"normal\"\n            }\n          },\n          \"unit\": \"reqps\"\n        },\n        \"overrides\": [\n          {\n            \"matcher\": {\n              \"id\": \"byRegexp\",\n              \"options\": \"/2../i\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"color\",\n                \"value\": \"#56A64B\"\n              }\n            ]\n          },\n          {\n            \"matcher\": {\n              \"id\": \"byRegexp\",\n              \"options\": \"/3../i\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"color\",\n                \"value\": \"#F2CC0C\"\n              }\n            ]\n          },\n          {\n            \"matcher\": {\n              \"id\": \"byRegexp\",\n              \"options\": \"/4../i\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"color\",\n                \"value\": \"#3274D9\"\n              }\n            ]\n          },\n          {\n            \"matcher\": {\n              \"id\": \"byRegexp\",\n              \"options\": \"/5../i\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"color\",\n                \"value\": \"#E02F44\"\n              }\n            ]\n          }\n        ]\n      },\n      \"gridPos\": {\n        \"h\": 7,\n        \"w\": 6,\n        \"x\": 6,\n 