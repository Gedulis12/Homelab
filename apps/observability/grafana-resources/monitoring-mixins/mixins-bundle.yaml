nimum\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"custom.lineStyle\",\n                \"value\": {\n                  \"dash\": [\n                    10,\n                    15\n                  ],\n                  \"fill\": \"dash\"\n                }\n              },\n              {\n                \"id\": \"custom.showPoints\",\n                \"value\": \"never\"\n              },\n              {\n                \"id\": \"custom.hideFrom\",\n                \"value\": {\n                  \"legend\": true,\n                  \"tooltip\": false,\n                  \"viz\": false\n                }\n              }\n            ]\n          },\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"Maximum\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"custom.lineStyle\",\n                \"value\": {\n                  \"dash\": [\n                    10,\n                    15\n                  ],\n                  \"fill\": \"dash\"\n                }\n              },\n              {\n                \"id\": \"custom.showPoints\",\n                \"value\": \"never\"\n              },\n              {\n                \"id\": \"custom.hideFrom\",\n                \"value\": {\n                  \"legend\": true,\n                  \"tooltip\": false,\n                  \"viz\": false\n                }\n              }\n            ]\n          }\n        ]\n      },\n      \"gridPos\": {\n        \"h\": 10,\n        \"w\": 8,\n        \"x\": 16,\n        \"y\": 22\n      },\n      \"targets\": [\n        {\n          \"datasource\": \"${datasource}\",\n          \"expr\": \"sum by (instance, component_path, component_id) (\\n    prometheus_remote_storage_shards{cluster=~\\\"$cluster\\\", namespace=~\\\"$namespace\\\", job=~\\\"$job\\\", instance=~\\\"$instance\\\", component_path=~\\\"$component_path