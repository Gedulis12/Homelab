---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: kube-state-metrics-v2
spec:
  folderRef: kubernetes-mixin-folder
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  datasources:
    - inputName: "DS_PROMETHEUS"
      datasourceName: "Prometheus"
    - inputName: "VAR_DATASOURCE"
      datasourceName: "Prometheus"
  grafanaCom:
    id: 21742
