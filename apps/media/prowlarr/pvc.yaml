---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prowlarr-config
  annotations:
    k8up.io/backup: true
  labels:
    name: prowlarr-config
spec:
  storageClassName: ""
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Mi

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: prowlarr-config
spec:
  storageClassName: ""
  capacity:
    storage: 1Mi
  volumeMode: Filesystem
  claimRef:
    name: prowlarr-config
    namespace: media
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Delete
  nfs:
    path: /mnt/fast/prowlarr
    server: 192.168.0.222
    mountOptions:
      - noatime
      - vers=3
      - soft
      - timeo=600
      - retrans=5
      - rsize=8192
      - wsize=8192
      - lookupcache=none
      - tcp
