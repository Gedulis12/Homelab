---
apiVersion: k8up.io/v1
kind: PreBackupPod
metadata:
  name: sonarr-db-dump
spec:
  backupCommand: sh -c 'sqlite3 /config/sonarr.db ".timeout 30000" "PRAGMA wal_checkpoint(TRUNCATE);" 2>/dev/null; cp /config/sonarr.db /tmp/backup.sqlite && sqlite3 /tmp/backup.sqlite ".dump"'
  pod:
    spec:
      containers:
        - name: sonarr-sqlite-dump
          image: alpine/sqlite:3.53.2
          command:
            - 'sleep'
            - 'infinity'
          volumeMounts:
            - name: config-pvc
              mountPath: "/config"
      volumes:
        - name: config-pvc
          persistentVolumeClaim:
            claimName: sonarr-config
