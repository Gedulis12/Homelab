---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd
resources:
  - namespace.yaml
  - https://raw.githubusercontent.com/argoproj/argo-cd/v3.1.0/manifests/install.yaml
  - httproute.yaml
  - apps/app-of-apps.yaml
  - oidc-sealed-secret.yaml

patches:
  - target:
      kind: ConfigMap
      name: argocd-cm
      version: v1
    patch: |-
      - op: add
        path: /data/kustomize.buildOptions
        value: --enable-helm
      - op: add
        path: /data/url
        value: https://argocd.g2net.xyz
      - op: add
        path: /data/oidc.config
        value: |
          name: Authentik
          issuer: https://auth.g2net.xyz/application/o/argocd/
          clientID: $argocd-oidc-secret:client-id
          clientSecret: $argocd-oidc-secret:client-secret
          requestedScopes: ["openid", "profile", "email", "entitlements"]
          requestedIDTokenClaims: {"groups": {"essential": true}, "entitlements": {"essential": true}}
  - target:
      kind: ConfigMap
      name: argocd-rbac-cm
      version: v1
    path: rbac-cm-patch.yaml
  - target:
      version: v1
      kind: Service
      labelSelector: app.kubernetes.io/part-of=argocd
    patch: |-
      - op: add
        path: /metadata/annotations/k8s.grafana.com~1scrape
        value: "true"
  - target:
      kind: ConfigMap
      name: argocd-cmd-params-cm
      version: v1
    path: tls-patch.yaml
  - target:
      kind: Deployment
      name: argocd-server
      version: v1
    path: dns-patch.yaml
